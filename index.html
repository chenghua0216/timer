<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>開會計時器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    display: flex;
    justify-content: flex-end;
    align-items: flex-start;
    min-height: 100vh;
    padding: 12px;
  }

  .timer-widget {
    background: rgba(15, 15, 20, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 16px 20px;
    width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
    user-select: none;
    cursor: default;
    transition: width 0.3s ease;
  }

  .timer-widget.expanded {
    width: 260px;
  }

  /* Header row */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .title {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .clock {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.04em;
  }

  /* Main timer display */
  .time-display {
    text-align: center;
    margin-bottom: 14px;
  }

  .time-text {
    font-size: 52px;
    font-weight: 200;
    letter-spacing: -1px;
    color: #ffffff;
    line-height: 1;
    transition: color 0.5s ease;
    font-variant-numeric: tabular-nums;
  }

  .time-text.warning { color: #ffa040; }
  .time-text.danger  { color: #ff4444; }
  .time-text.done    { color: #ff4444; animation: blink 0.8s step-start infinite; }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  /* Progress ring */
  .progress-ring-wrap {
    position: relative;
    width: 60px;
    height: 60px;
    margin: 0 auto 10px;
    display: none;
  }

  .progress-ring-wrap.visible { display: block; }

  .progress-ring {
    transform: rotate(-90deg);
  }

  .ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
  .ring-progress {
    fill: none;
    stroke: #4dabf7;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }
  .ring-progress.warning { stroke: #ffa040; }
  .ring-progress.danger  { stroke: #ff4444; }

  .ring-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
  }

  /* Preset buttons */
  .presets {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .preset-btn {
    flex: 1;
    min-width: 0;
    padding: 5px 2px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .preset-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.3);
    color: #fff;
  }

  .preset-btn.active {
    background: rgba(77,171,247,0.2);
    border-color: rgba(77,171,247,0.6);
    color: #4dabf7;
  }

  /* Custom time input */
  .custom-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    align-items: center;
  }

  .custom-input-row input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .custom-input-row input:focus {
    border-color: rgba(77,171,247,0.6);
    background: rgba(77,171,247,0.08);
  }

  .custom-input-row input::placeholder { color: rgba(255,255,255,0.25); }

  .set-btn {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(77,171,247,0.4);
    background: rgba(77,171,247,0.15);
    color: #4dabf7;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .set-btn:hover { background: rgba(77,171,247,0.3); }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ctrl-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 10px;
    border: none;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.03em;
  }

  .btn-start {
    background: linear-gradient(135deg, #339af0, #228be6);
    color: #fff;
    box-shadow: 0 2px 8px rgba(34,139,230,0.35);
  }
  .btn-start:hover { background: linear-gradient(135deg, #4dabf7, #339af0); transform: translateY(-1px); }

  .btn-pause {
    background: linear-gradient(135deg, #ffa94d, #fd7e14);
    color: #fff;
    box-shadow: 0 2px 8px rgba(253,126,20,0.35);
  }
  .btn-pause:hover { background: linear-gradient(135deg, #ffc078, #ffa94d); transform: translateY(-1px); }

  .btn-reset {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .btn-reset:hover { background: rgba(255,255,255,0.14); color: #fff; }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 12px 0;
  }

  /* Elapsed / stopwatch mode */
  .mode-toggle {
    display: flex;
    gap: 0;
    background: rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 2px;
    margin-bottom: 12px;
  }

  .mode-btn {
    flex: 1;
    padding: 4px 6px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .mode-btn.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }

  /* Done message */
  .done-banner {
    display: none;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: #ff4444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
    animation: fadeIn 0.3s ease;
  }

  .done-banner.visible { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: translateY(0); } }

  /* Drag handle */
  .drag-hint {
    text-align: center;
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    margin-top: 10px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="timer-widget" id="widget">
  <div class="header">
    <span class="title">Meeting Timer</span>
    <span class="clock" id="clock">--:--</span>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="modeCountdown" onclick="setMode('countdown')">倒數</button>
    <button class="mode-btn" id="modeStopwatch" onclick="setMode('stopwatch')">正計時</button>
  </div>

  <div class="time-display">
    <div class="time-text" id="timeText">30:00</div>
  </div>

  <div id="countdownSection">
    <div class="presets" id="presets">
      <button class="preset-btn" onclick="setPreset(5)">5'</button>
      <button class="preset-btn" onclick="setPreset(10)">10'</button>
      <button class="preset-btn active" onclick="setPreset(30)">30'</button>
      <button class="preset-btn" onclick="setPreset(60)">60'</button>
    </div>

    <div class="custom-input-row">
      <input type="text" id="customInput" placeholder="mm:ss 或 分鐘" maxlength="5" />
      <button class="set-btn" onclick="applyCustom()">設定</button>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleStartPause()">開始</button>
    <button class="ctrl-btn btn-reset" onclick="resetTimer()">重置</button>
  </div>

  <div class="done-banner" id="doneBanner">⏰ 時間到！</div>
  <div class="drag-hint">拖曳移動視窗</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let mode = 'countdown';      // 'countdown' | 'stopwatch'
  let totalSeconds = 30 * 60;
  let remainingSeconds = 30 * 60;
  let elapsedSeconds = 0;
  let running = false;
  let intervalId = null;
  let audioCtx = null;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const timeText   = document.getElementById('timeText');
  const startBtn   = document.getElementById('startBtn');
  const doneBanner = document.getElementById('doneBanner');
  const clockEl    = document.getElementById('clock');
  const presetBtns = document.querySelectorAll('.preset-btn');

  // ── Clock ──────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    clockEl.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Formatting ─────────────────────────────────────────────────────────────
  function formatTime(s) {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  // ── Display update ─────────────────────────────────────────────────────────
  function updateDisplay() {
    const secs = mode === 'countdown' ? remainingSeconds : elapsedSeconds;
    timeText.textContent = formatTime(secs);

    timeText.classList.remove('warning', 'danger', 'done');
    if (mode === 'countdown') {
      const pct = totalSeconds > 0 ? remainingSeconds / totalSeconds : 1;
      if (remainingSeconds <= 0) {
        timeText.classList.add('done');
      } else if (pct <= 0.1 || remainingSeconds <= 60) {
        timeText.classList.add('danger');
      } else if (pct <= 0.25 || remainingSeconds <= 180) {
        timeText.classList.add('warning');
      }
    }
  }

  // ── Mode switch ────────────────────────────────────────────────────────────
  function setMode(m) {
    if (running) resetTimer();
    mode = m;
    document.getElementById('modeCountdown').classList.toggle('active', m === 'countdown');
    document.getElementById('modeStopwatch').classList.toggle('active', m === 'stopwatch');
    document.getElementById('countdownSection').style.display = m === 'countdown' ? '' : 'none';
    elapsedSeconds = 0;
    if (m === 'countdown') remainingSeconds = totalSeconds;
    doneBanner.classList.remove('visible');
    updateDisplay();
  }

  // ── Presets ────────────────────────────────────────────────────────────────
  function setPreset(minutes) {
    if (running) resetTimer();
    totalSeconds = minutes * 60;
    remainingSeconds = totalSeconds;
    presetBtns.forEach(b => {
      b.classList.toggle('active', b.textContent === `${minutes}'`);
    });
    doneBanner.classList.remove('visible');
    updateDisplay();
  }

  // ── Custom input ───────────────────────────────────────────────────────────
  function applyCustom() {
    const raw = document.getElementById('customInput').value.trim();
    if (!raw) return;
    let secs = 0;
    if (raw.includes(':')) {
      const parts = raw.split(':');
      secs = parseInt(parts[0] || 0) * 60 + parseInt(parts[1] || 0);
    } else {
      secs = parseFloat(raw) * 60;
    }
    secs = Math.max(1, Math.round(secs));
    if (running) resetTimer();
    totalSeconds = secs;
    remainingSeconds = secs;
    presetBtns.forEach(b => b.classList.remove('active'));
    doneBanner.classList.remove('visible');
    updateDisplay();
  }

  // ── Start / Pause ──────────────────────────────────────────────────────────
  function toggleStartPause() {
    if (mode === 'countdown' && remainingSeconds <= 0 && !running) {
      resetTimer();
      return;
    }
    if (running) {
      pause();
    } else {
      start();
    }
  }

  function start() {
    running = true;
    startBtn.textContent = '暫停';
    startBtn.className = 'ctrl-btn btn-pause';
    doneBanner.classList.remove('visible');
    intervalId = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    startBtn.textContent = '繼續';
    startBtn.className = 'ctrl-btn btn-start';
    clearInterval(intervalId);
  }

  function resetTimer() {
    running = false;
    clearInterval(intervalId);
    remainingSeconds = totalSeconds;
    elapsedSeconds = 0;
    startBtn.textContent = '開始';
    startBtn.className = 'ctrl-btn btn-start';
    doneBanner.classList.remove('visible');
    updateDisplay();
  }

  function tick() {
    if (mode === 'countdown') {
      remainingSeconds = Math.max(0, remainingSeconds - 1);
      updateDisplay();
      if (remainingSeconds <= 0) {
        pause();
        doneBanner.classList.add('visible');
        playAlarm();
        startBtn.textContent = '重新開始';
      }
    } else {
      elapsedSeconds++;
      updateDisplay();
    }
  }

  // ── Keyboard shortcuts ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); toggleStartPause(); }
    if (e.code === 'KeyR')  resetTimer();
  });

  // ── Alarm sound (Web Audio API) ────────────────────────────────────────────
  function playAlarm() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const beep = (freq, start, dur) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime + start);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + start + dur);
        osc.start(audioCtx.currentTime + start);
        osc.stop(audioCtx.currentTime + start + dur);
      };
      beep(880, 0,    0.18);
      beep(880, 0.22, 0.18);
      beep(1100, 0.5, 0.35);
    } catch(e) {}
  }

  // ── Drag to move ───────────────────────────────────────────────────────────
  const widget = document.getElementById('widget');
  let dragState = null;

  widget.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    dragState = {
      startX: e.clientX,
      startY: e.clientY,
      origLeft: widget.getBoundingClientRect().left,
      origTop:  widget.getBoundingClientRect().top,
    };
    widget.style.position = 'fixed';
    widget.style.left = dragState.origLeft + 'px';
    widget.style.top  = dragState.origTop  + 'px';
    widget.style.right = 'auto';
    widget.style.bottom = 'auto';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragState) return;
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    widget.style.left = (dragState.origLeft + dx) + 'px';
    widget.style.top  = (dragState.origTop  + dy) + 'px';
  });

  document.addEventListener('mouseup', () => { dragState = null; });

  // ── Touch drag ─────────────────────────────────────────────────────────────
  widget.addEventListener('touchstart', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    const t = e.touches[0];
    dragState = {
      startX: t.clientX, startY: t.clientY,
      origLeft: widget.getBoundingClientRect().left,
      origTop:  widget.getBoundingClientRect().top,
    };
    widget.style.position = 'fixed';
    widget.style.left = dragState.origLeft + 'px';
    widget.style.top  = dragState.origTop  + 'px';
    widget.style.right = 'auto'; widget.style.bottom = 'auto';
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!dragState) return;
    const t = e.touches[0];
    widget.style.left = (dragState.origLeft + t.clientX - dragState.startX) + 'px';
    widget.style.top  = (dragState.origTop  + t.clientY - dragState.startY) + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => { dragState = null; });

  // ── Init ───────────────────────────────────────────────────────────────────
  updateDisplay();
</script>
</body>
</html>
